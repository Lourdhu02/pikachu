version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - MODEL_PATH=/app/models/best.pt
      - DEVICE=cuda:0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
